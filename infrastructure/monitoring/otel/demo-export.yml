exporters:
  otlphttp/rootpilot:
    endpoint: "http://rootpilot-otel-collector:4318"
    tls:
      insecure: true

service:
  pipelines:
    traces:
      exporters: [debug, span_metrics, otlphttp/rootpilot]
    metrics:
      exporters: [debug, otlphttp/rootpilot]
    logs:
      exporters: [debug, otlphttp/rootpilot]
