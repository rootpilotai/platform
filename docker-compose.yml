services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rootpilot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rootpilot
      RABBITMQ_DEFAULT_PASS: rootpilot
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16
    container_name: rootpilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rootpilot
      POSTGRES_PASSWORD: rootpilot
      POSTGRES_DB: rootpilot
    volumes:
      - rootpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootpilot -d rootpilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: rootpilot-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - rootpilot-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: rootpilot-otel-collector
    ports:
      - "4318:4318"
      - "4317:4317"
      - "8888:8888"
      - "8889:8889"
    environment:
      - OTEL_LOG_LEVEL=debug
    volumes:
      - ./infrastructure/monitoring/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: rootpilot-notification
    ports:
      - "8003:8003"
    environment:
      NOTIFICATION_SERVICE_NAME: notification-service
      NOTIFICATION_ENVIRONMENT: development
      NOTIFICATION_EVENT_BUS_URL: amqp://rootpilot:rootpilot@rabbitmq:5672/
      NOTIFICATION_SLACK_ENABLED: "false"
      NOTIFICATION_DISCORD_ENABLED: "false"
    depends_on:
      rabbitmq:
        condition: service_healthy

volumes:
  rootpilot-postgres-data:
  rootpilot-elasticsearch-data:
