services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rootpilot-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rootpilot
      RABBITMQ_DEFAULT_PASS: rootpilot
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rootpilot-net

  postgres:
    image: postgres:16
    container_name: rootpilot-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rootpilot
      POSTGRES_PASSWORD: rootpilot
      POSTGRES_DB: rootpilot
    volumes:
      - rootpilot-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rootpilot -d rootpilot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rootpilot-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.3
    container_name: rootpilot-elasticsearch
    ports:
      - "9200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - rootpilot-elasticsearch-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - rootpilot-net

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.112.0
    container_name: rootpilot-otel-collector
    ports:
      - "4318:4318"
      - "4317:4317"
      - "8888:8888"
      - "8889:8889"
    environment:
      - OTEL_LOG_LEVEL=debug
    volumes:
      - ./infrastructure/monitoring/otel/otel-collector.yml:/etc/otelcol-contrib/config.yaml
    networks:
      - rootpilot-net

  ingestion-service:
    build:
      context: .
      dockerfile: services/ingestion-service/Dockerfile
    container_name: rootpilot-ingestion
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      EVENT_BUS_URL: amqp://rootpilot:rootpilot@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rootpilot-net

  correlation-service:
    build:
      context: .
      dockerfile: services/correlation-service/Dockerfile
    container_name: rootpilot-correlation
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8001
      EVENT_BUS_URL: amqp://rootpilot:rootpilot@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rootpilot-net

  ai-investigation-service:
    build:
      context: .
      dockerfile: services/ai-investigation-service/Dockerfile
    container_name: rootpilot-ai-investigation
    ports:
      - "8002:8002"
    env_file:
      - .env
    environment:
      INVESTIGATION_EVENT_BUS_URL: amqp://rootpilot:rootpilot@rabbitmq:5672/
      INVESTIGATION_LLM_PROVIDER: openai
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rootpilot-net

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
    container_name: rootpilot-notification
    ports:
      - "8003:8003"
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 8003
      EVENT_BUS_URL: amqp://rootpilot:rootpilot@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - rootpilot-net

volumes:
  rootpilot-postgres-data:
  rootpilot-elasticsearch-data:

networks:
  rootpilot-net:
    driver: bridge
